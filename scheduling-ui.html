<!-- SCHEDULING UI - Add these to your index.html -->

<!-- Add to tech home screen (after recent inspections card) -->
<div class="card" style="margin-bottom:16px;border-color:rgba(232,255,71,.2)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div class="card-title" style="color:var(--accent);margin-bottom:0">📅 My Schedule</div>
    <button class="btn btn-dark" style="font-size:11px;padding:6px 12px" onclick="openTechAvailabilityModal()">⚙️ Set Hours</button>
  </div>
  <button class="btn btn-accent" style="width:100%;justify-content:center" onclick="openTechScheduleView()">View Appointments</button>
</div>

<!-- Add to customer portal - in "Send To" section after tech selection -->
<div class="portal-card" id="portal-scheduling-card" style="display:none;border-color:rgba(34,214,122,.2)">
  <div class="pc-title" style="color:#22d67a">📅 Schedule Appointment</div>
  <div style="font-size:13px;color:rgba(255,255,255,.45);margin-bottom:14px">Choose a date and time that works for you.</div>
  <button class="portal-btn portal-btn-accent" onclick="openSchedulingModal(window.portalSelectedTech.username, window.portalSelectedTech.name)" style="width:100%;justify-content:center">
    📅 Schedule Now
  </button>
</div>

<!-- Add appointment status display to customer portal -->
<div class="portal-card" id="portal-appointment-card" style="display:none;border-color:rgba(34,214,122,.2)">
  <div class="pc-title" style="color:#22d67a">✓ Appointment Confirmed</div>
  <div id="portal-appointment-content"></div>
</div>

<!-- Add to tech home screen - appointment badge -->
<div id="tech-appointment-badge" style="position:fixed;top:80px;right:20px;background:rgba(232,255,71,.15);border:1px solid rgba(232,255,71,.3);border-radius:12px;padding:12px 16px;display:none;z-index:100">
  <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">📅 Upcoming</div>
  <div id="appointment-badge-count" style="font-size:20px;font-weight:800;color:#e8ff47;text-align:center">0</div>
</div>

<style>
  .scheduling-calendar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }

  .scheduling-time-slot {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid rgba(232, 255, 71, .2);
    background: rgba(232, 255, 71, .08);
    color: #e8ff47;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .scheduling-time-slot:hover:not(:disabled) {
    background: rgba(232, 255, 71, .3);
    transform: translateY(-2px);
  }

  .scheduling-time-slot:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    color: rgba(255, 59, 59, .5);
    border-color: rgba(255, 59, 59, .2);
    background: rgba(255, 59, 59, .06);
  }

  .appointment-card {
    background: var(--bg);
    border-left: 4px solid #e8ff47;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .appointment-card.completed {
    border-left-color: #22d67a;
    opacity: 0.8;
  }

  .appointment-time {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #e8ff47;
  }

  .appointment-details {
    font-size: 13px;
    color: var(--text);
    margin-top: 8px;
  }
</style>

<script>
  // Hook scheduling into portal tech selection
  const originalSetSendToTech = window.setSendToTech;
  window.setSendToTech = function(username, name) {
    originalSetSendToTech(username, name);
    
    // Show scheduling button after tech selection
    const scheduleCard = document.getElementById('portal-scheduling-card');
    if (scheduleCard) {
      scheduleCard.style.display = 'block';
    }
  };

  // Hook into portal submit to show appointment if scheduled
  const originalSubmitPortal = window.submitPortal;
  window.submitPortal = function() {
    if (window.selectedScheduleDate && window.selectedScheduleTime) {
      // Show appointment confirmation
      const aptCard = document.getElementById('portal-appointment-card');
      if (aptCard) {
        const formattedDate = new Date(window.selectedScheduleDate).toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'long',
          day: 'numeric'
        });
        aptCard.innerHTML = `
          <div style="background:rgba(34,214,122,.08);border:1px solid rgba(34,214,122,.2);border-radius:10px;padding:14px;margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="font-size:28px">📅</div>
              <div>
                <div style="font-weight:700;font-size:14px">${formattedDate}</div>
                <div style="font-size:13px;color:rgba(255,255,255,.6)">at <strong>${window.selectedScheduleTime}</strong></div>
              </div>
            </div>
          </div>
          <div style="font-size:12px;color:var(--muted)">
            Your technician will see this appointment and confirm availability. You'll receive updates.
          </div>
        `;
        aptCard.style.display = 'block';
      }
    }
    
    return originalSubmitPortal();
  };

  // Update tech appointment badge
  function updateTechAppointmentBadge() {
    if (currentTechAccount?.role !== 'tech') return;
    
    const badge = document.getElementById('tech-appointment-badge');
    const count = document.getElementById('appointment-badge-count');
    
    if (!badge || !count) return;
    
    const techAppts = window.techSchedules?.[currentTechAccount.username] || [];
    const upcoming = techAppts.filter(a => {
      const aptDate = new Date(a.date + 'T' + a.timeSlot);
      return aptDate > new Date();
    }).length;
    
    if (upcoming > 0) {
      count.textContent = upcoming;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  }

  // Update badge on page load
  document.addEventListener('DOMContentLoaded', function() {
    setInterval(updateTechAppointmentBadge, 30000); // Update every 30 seconds
    updateTechAppointmentBadge();
  });
</script>
